name: Release

on:
  push:
    branches: [main, release]
    paths-ignore: ["**.md"]

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run test:pretty

      - run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Calculate bump type from last stable release
        id: bump
        if: "github.ref_name == 'main' && !startsWith(github.event.head_commit.message, 'chore: release')"
        run: |
          LAST_STABLE=$(git tag --sort=-v:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | head -1)
          echo "Last stable tag: ${LAST_STABLE}"
          if git log "${LAST_STABLE}..HEAD" --format="%s%n%b" | grep -qE "BREAKING[- ]CHANGE|^[a-z]+(\(.+\))?!:"; then
            echo "increment=major" >> "$GITHUB_OUTPUT"
          elif git log "${LAST_STABLE}..HEAD" --format="%s" | grep -qE "^feat(\(.+\))?:"; then
            echo "increment=minor" >> "$GITHUB_OUTPUT"
          else
            echo "increment=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Beta release (main)
        if: "github.ref_name == 'main' && !startsWith(github.event.head_commit.message, 'chore: release')"
        run: |
          npm run release:beta -- --increment=${{ steps.bump.outputs.increment }}
          npm publish --provenance --tag beta
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync develop after beta release
        if: "github.ref_name == 'main' && !startsWith(github.event.head_commit.message, 'chore: release')"
        run: git push origin HEAD:develop 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stable release (release branch)
        if: github.ref_name == 'release'
        run: |
          npm run release
          npm publish --provenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync main and develop after stable release
        if: github.ref_name == 'release'
        run: |
          git push origin HEAD:main
          git push origin HEAD:develop 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
