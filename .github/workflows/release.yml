name: Release

on:
  push:
    branches: [main, release]
    paths-ignore: ["**.md"]

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run test:pretty

      - run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Beta release (main)
        if: github.ref_name == 'main' && !startsWith(github.event.head_commit.message, 'chore: release')
        run: |
          npm run release:beta
          npm publish --provenance --tag beta
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stable release (release branch)
        if: github.ref_name == 'release'
        run: |
          npm run release
          npm publish --provenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync main and develop after stable release
        if: github.ref_name == 'release'
        run: |
          git push origin HEAD:main
          git push origin HEAD:develop 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
